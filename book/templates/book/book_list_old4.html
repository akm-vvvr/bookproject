<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    
    <title>本棚アプリ</title>
  </head>

  <body>
    {% for item in object_list %}
    <!-- item変数にobject_listに入ってるデータをひとつずつ取り出しながら入れる-->
    <!--object_listはListViewで指定したすべてのデータ（この場合はBookのデータ）が入っている-->
    <div class="card">
        <h5 class="card-header">{{ item.title }}</h5>
        <!--item変数に入ったobject_listのtitle要素が入る。models.pyのBookクラスのtitleで定義したもの-->

        <div class="card-body">
            <p class="card-text">{{ item.text }}</p>
            <!--item変数に入ったobject_listのtext要素が入る。models.pyのBookクラスのtextで定義したもの-->
            <a href="#" class="btn btn-primary">Go somewhere</a>
            <h6 class="card-title">{{ item.category }}</h6>
            <!--item変数に入ったobject_listのcategory要素が入る。models.pyのBookクラスのcategoryで定義したもの-->
        </div>
    </div>
    <!--つまり、object_listに入っているデータを、itemという名前で順番に呼び出せるようにしてるのがこのhtmlファイルである-->
    {% endfor %}
  </body>
</html>
