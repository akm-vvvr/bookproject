<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-64UC4BEhTGwk3eGpak4nO2jqtl7liTS+juXkSJ2gPAQPmlClQO7s5UgCeR6US48g" crossorigin="anonymous">
  </head>
  <body>
    {% for item in object_list %}
    <ul>
    <!-- item変数にobject_listに入ってるデータをひとつずつ取り出しながら入れる-->
    <!--object_listはListViewで指定したすべてのデータ（この場合はBookのデータ）が入っている-->
    <li>{{ item.title }}</li> <!--item変数に入ったobject_listのtitle要素が入る。models.pyのBookクラスのtitleで定義したもの-->
    <li>{{ item.text }}</li> <!--item変数に入ったobject_listのtext要素が入る。models.pyのBookクラスのtextで定義したもの-->
    <li>{{ item.category }}</li> <!--item変数に入ったobject_listのcategory要素が入る。models.pyのBookクラスのcategoryで定義したもの-->
    </ul>
    {% endfor %}
    <!--つまり、object_listに入っているデータを、itemという名前で順番に呼び出せるようにしてるのがこのhtmlファイルである-->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-jdSIJTK9l6XwXj3RixpVDXtMcA2bFd9O81RlLAwhpr2oXRqvQP88rr16IeFXTgFE" crossorigin="anonymous"></script>
  </body>
</html>
