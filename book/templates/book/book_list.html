{% extends 'base.html' %}
<!-- base.htmlを継承している-->

{% block title %}書籍一覧{% endblock %}
<!-- これがbase.htmlのblock titleのところに入る -->

{% block h1 %}書籍一覧{% endblock %}
<!-- これがbase.htmlのblock h1のところに入る -->

{% block content %}
  {% for item in object_list %}
  <!-- item変数にobject_listに入ってるデータをひとつずつ取り出しながら入れる-->
  <!--object_listはListViewで指定したすべてのデータ（この場合はBookのデータ）が入っている-->
  <div class="p-4 m-4 bg-light border border-success rounded">
    <h2 class="text-success">{{ item.title }}</h2>
    <!--item変数に入ったobject_listのtitle要素が入る。models.pyのBookクラスのtitleで定義したもの-->
    <img src="{{ item.thumbnail.url }}" class="img-thumbnail" />
    <h6>カテゴリ：{{ item.category }}</h6>
    <!--item変数に入ったobject_listのcategory要素が入る。models.pyのBookクラスのcategoryで定義したもの-->

    <div class="mt-3">
      <a href="{% url 'detail-book' item.pk %}">詳細へ</a>
      <!-- 各アイテムのプライマリーキーをセットしたdetail-bookにリンクを貼る -->
    </div>
  </div>
  <!--つまり、object_listに入っているデータを、itemという名前で順番に呼び出せるようにしてるのがこのhtmlファイルである-->
  {% endfor %}
  {% include 'book/components/pagination.html' %}
{% endblock content %}
<!-- これがbase.htmlのblock contentのところに入る -->
